<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- 全ページの <head> 内に必ず入れる -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール | わたしのWebサイト</title>
    <!-- PNG形式の場合はこちら -->
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ナビゲーションバー（全ページ共通）
    「クリックしても別のページに移動しないのが正常です！（ただし、クリックすると画面の上部にスクロールが上がることがあります。）」-->
    <header class="site-header">
        <div class="header-inner">
            <p class="site-title">
                <a href="index.html">🌿 わたしのWebサイト</a>
            </p>
            <!-- header-inner の中、nav タグの直前に追加 -->
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="メニューを開く">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html">ホーム</a></li>
                    <li><a href="about.html" class="active">プロフィール</a></li>
                    <li><a href="works.html">作品集</a></li>
                    <!-- ↓ 第4章から引き継いで「お問い合わせ」を追加 ↓ -->
                    <li><a href="contact.html">お問い合わせ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <h1>プロフィール</h1>
        <div class="profile-card">
            <div class="profile-photo">
                <img src="images/photo.jpg" alt="プロフィール写真">
            </div>
            <div class="profile-info">
                <h2>田中 みなみ</h2>
                <p class="tagline">Web制作をゼロから学習中の22歳です</p>
                <ul class="skill-list">
                    <li>HTML / CSS（学習中）</li>
                    <li>読書・料理が趣味</li>
                    <li>東京都在住</li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 わたしのWebサイト</p>
    </footer>

    <script>
    // ハンバーガーボタンとナビゲーションを取得
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mainNav = document.querySelector('.main-nav');
 
    // ボタンがクリックされたときの処理
    hamburgerBtn.addEventListener('click', function() {
        // ボタンに 'is-open' クラスを付けたり外したりする
        hamburgerBtn.classList.toggle('is-open');
        // ナビゲーションにも 'is-open' クラスを付けたり外したりする
        mainNav.classList.toggle('is-open');
    });
    </script>

</body>
</html>
