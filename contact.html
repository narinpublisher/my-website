-<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== ヘッダー（他のページと同じ） ===== -->
    <header class="site-header">
        <div class="header-inner">
            <p class="site-title">
                <a href="index.html">🌿 わたしのWebサイト</a>
            </p>
            <!-- header-inner の中、nav タグの直前に追加 -->
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="メニューを開く">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html">ホーム</a></li>
                    <li><a href="about.html">プロフィール</a></li>
                    <li><a href="works.html">作品集</a></li>
                    <li><a href="contact.html" class="active">お問い合わせ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ===== メインコンテンツ ===== -->
    <main class="main-content">
        <h1>お問い合わせ</h1>
        <p class="page-description">ご質問・お仕事のご依頼はこちらからお気軽にどうぞ。</p>

        <!-- お問い合わせフォーム -->
        <form class="contact-form" action="#" method="post">

            <!-- お名前 -->
            <div class="form-group">
                <label for="name">お名前 <span class="required">必須</span></label>
                <input type="text" id="name" name="name"
                       placeholder="例：田中みなみ" required>
            </div>

            <!-- メールアドレス -->
            <div class="form-group">
                <label for="email">メールアドレス <span class="required">必須</span></label>
                <input type="email" id="email" name="email"
                       placeholder="例：tanaka@example.com" required>
            </div>

            <!-- 件名 -->
            <div class="form-group">
                <label for="subject">件名</label>
                <input type="text" id="subject" name="subject"
                       placeholder="例：お仕事のご相談">
            </div>

            <!-- メッセージ -->
            <div class="form-group">
                <label for="message">メッセージ <span class="required">必須</span></label>
                <textarea id="message" name="message" rows="6"
                          placeholder="お問い合わせ内容をご記入ください" required></textarea>
            </div>

            <!-- 送信ボタン -->
            <div class="form-submit">
                <button type="submit" class="submit-btn">送信する</button>
            </div>

        </form>
    </main>

    <!-- ===== フッター ===== -->
    <footer class="site-footer">
        <p>© 2025 My Portfolio. All rights reserved.</p>
    </footer>

    <!-- ===== ハンバーガーメニューのJS（他のページと同じ） ===== -->
    <script>
        // ハンバーガーボタンとナビゲーションを取得
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const mainNav = document.querySelector('.main-nav');

        // ボタンがクリックされたときの処理
        hamburgerBtn.addEventListener('click', function() {
            // ボタンに 'is-open' クラスを付けたり外したりする
            hamburgerBtn.classList.toggle('is-open');
            // ナビゲーションにも 'is-open' クラスを付けたり外したりする
            mainNav.classList.toggle('is-open');
        });
    </script>

</body>
</html>
